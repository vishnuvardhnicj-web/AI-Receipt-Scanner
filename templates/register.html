{% extends 'base.html' %}
{% block content %}
  <h2>Register</h2>
  <form method="post" class="form-card">
    <div class="form-group">
      <label>Username
        <input name="username" type="text" required>
      </label>
    </div>
    <div class="form-group">
      <label>Password
        <input name="password" type="password" required>
      </label>
    </div>
    <button type="submit" class="btn btn-submit">Register</button>
  </form>
{% endblock %}
